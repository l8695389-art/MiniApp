<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{
    font-family:Arial;
    background:#1e1e1e;
    color:white;
    text-align:center;
    padding:40px;
}
button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<h1>Mini App Telegram</h1>

<p id="name"></p>

<button onclick="Telegram.WebApp.close()">
Đóng Mini App
</button>

<script>
Telegram.WebApp.ready();

document.getElementById("name").innerHTML =
"Xin chào: " +
Telegram.WebApp.initDataUnsafe.user.first_name;
</script>

</body>
</html>
