<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MiniApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --tg-blue: #229ED9;
      --tg-dark: #0A0E1A;
      --tg-surface: #0F1629;
      --tg-border: rgba(34, 158, 217, 0.18);
      --tg-text: #E8EDF5;
      --tg-muted: #5A7A99;
      --tg-glow: rgba(34, 158, 217, 0.35);
      --danger: #FF4D6D;
      --danger-glow: rgba(255, 77, 109, 0.3);
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--tg-dark);
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      color: var(--tg-text);
      overflow: hidden;
    }
    /* ─── LOADING SCREEN ─── */
    #screen-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      background: var(--tg-dark);
      z-index: 100;
    }
    .logo-wrap { position: relative; width: 88px; height: 88px; }
    .logo-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--tg-blue);
      border-right-color: rgba(34,158,217,0.4);
      animation: spin 1.1s linear infinite;
    }
    .logo-ring.ring2 {
      inset: 8px;
      border-top-color: transparent;
      border-bottom-color: var(--tg-blue);
      border-left-color: rgba(34,158,217,0.4);
      animation-duration: 1.7s;
      animation-direction: reverse;
    }
    .logo-core {
      position: absolute; inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, rgba(34,158,217,0.22), transparent 70%);
      border: 1.5px solid var(--tg-border);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-core svg { width: 28px; height: 28px; fill: var(--tg-blue); filter: drop-shadow(0 0 8px var(--tg-glow)); }
    .loading-label { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tg-muted); font-weight: 500; }
    .loading-dots span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--tg-blue); margin: 0 3px;
      animation: bounce 1.2s ease-in-out infinite; opacity: 0.4;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    /* ─── BLOCK SCREEN (non-Telegram) ─── */
    #screen-blocked {
      position: fixed; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px;
      background: var(--tg-dark); z-index: 90;
    }
    .block-card {
      width: 100%; max-width: 360px; background: var(--tg-surface);
      border: 1px solid rgba(255,77,109,0.25); border-radius: 20px;
      padding: 40px 32px; text-align: center; position: relative; overflow: hidden;
    }
    .block-card::before {
      content: ''; position: absolute; inset: -1px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,77,109,0.15), transparent 60%);
      pointer-events: none;
    }
    .block-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,77,109,0.12); border: 1.5px solid rgba(255,77,109,0.3);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
    }
    .block-icon svg { width: 28px; height: 28px; stroke: var(--danger); fill: none; stroke-width: 2; stroke-linecap: round; filter: drop-shadow(0 0 8px var(--danger-glow)); }
    .block-title { font-size: 20px; font-weight: 700; color: var(--tg-text); letter-spacing: -0.02em; margin-bottom: 10px; }
    .block-subtitle { font-size: 14px; color: var(--tg-muted); line-height: 1.6; margin-bottom: 28px; }
    .block-badge {
      display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 40px;
      background: rgba(34,158,217,0.08); border: 1px solid var(--tg-border); font-size: 13px;
      color: var(--tg-blue); font-weight: 500;
    }
    .block-badge svg { width: 15px; height: 15px; fill: var(--tg-blue); }
    /* ─── MAIN CONTENT ─── */
    #screen-main {
      position: fixed; inset: 0; display: none; flex-direction: column; align-items: center;
      padding: env(safe-area-inset-top, 16px) 20px 20px; overflow-y: auto; background: var(--tg-dark);
    }
    .main-header { width: 100%; max-width: 420px; padding-top: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--tg-blue), #1A6FA0);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 16px; font-weight: 600; color: var(--tg-text); }
    .header-env { font-size: 12px; color: var(--tg-blue); margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #3DDC7A;
      box-shadow: 0 0 8px rgba(61,220,122,0.6); animation: pulse-green 2s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 6px rgba(61,220,122,0.5); }
      50% { box-shadow: 0 0 14px rgba(61,220,122,0.9); }
    }
    .content-grid { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: var(--tg-surface); border: 1px solid var(--tg-border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
    .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tg-muted); margin-bottom: 10px; }
    .card-value { font-size: 15px; color: var(--tg-text); font-weight: 500; }
    .card-value.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: var(--tg-blue); word-break: break-all; }
    .card.highlight { background: linear-gradient(135deg, rgba(34,158,217,0.1), rgba(34,158,217,0.04)); border-color: rgba(34,158,217,0.3); }
    .card.highlight::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--tg-blue), transparent);
    }
    .verified-row { display: flex; align-items: center; gap: 8px; }
    .check-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(61,220,122,0.15); border: 1.5px solid rgba(61,220,122,0.4);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .check-icon svg { width: 11px; height: 11px; stroke: #3DDC7A; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .primary-btn {
      width: 100%; padding: 17px 20px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--tg-blue), #1A6FA0); color: #fff;
      font-family: inherit; font-size: 15px; font-weight: 600; letter-spacing: 0.01em;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 10px 28px -10px var(--tg-glow);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .primary-btn:active { transform: scale(0.97); }
    .primary-btn:disabled { opacity: 0.65; cursor: default; transform: none; }
    .primary-btn .spinner {
      display: none; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; animation: spin 0.7s linear infinite;
    }
    .primary-btn.loading .spinner { display: inline-block; }
    .link-result { display: none; }
    .link-actions { display: flex; gap: 10px; margin-top: 14px; }
    .secondary-btn {
      flex: 1; text-align: center; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--tg-border); background: rgba(34,158,217,0.08); color: var(--tg-blue);
      font-family: inherit; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer;
      transition: background 0.15s ease;
    }
    .secondary-btn:active { background: rgba(34,158,217,0.2); }
    .secondary-btn:disabled { opacity: 0.5; cursor: default; }
    .error-text {
      display: none; margin-top: 2px; padding: 12px 16px; border-radius: 12px;
      background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.25);
      font-size: 13px; color: var(--danger); text-align: center; line-height: 1.5;
    }
    .status-text {
      display: none; margin-top: 2px; padding: 12px 16px; border-radius: 12px;
      background: rgba(34,158,217,0.08); border: 1px solid var(--tg-border);
      font-size: 13px; color: var(--tg-blue); text-align: center; line-height: 1.5;
    }
    .success-text {
      display: none; margin-top: 2px; padding: 12px 16px; border-radius: 12px;
      background: rgba(61,220,122,0.1); border: 1px solid rgba(61,220,122,0.35);
      font-size: 13px; color: #3DDC7A; text-align: center; line-height: 1.5; font-weight: 600;
    }
  </style>
</head>
<body>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    function isTelegramMiniApp() {
      return !!(
        typeof window !== 'undefined' &&
        window.Telegram &&
        window.Telegram.WebApp &&
        window.Telegram.WebApp.initData &&
        window.Telegram.WebApp.initData.length > 0
      );
    }

    function hexToRgb(hex) {
      if (!hex) return { r: 34, g: 158, b: 217 };
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const num = parseInt(hex, 16);
      return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    }

    function applyTelegramTheme(tg) {
      const tp = tg.themeParams || {};
      const root = document.documentElement.style;
      const bg      = tp.bg_color || (tg.colorScheme === 'light' ? '#FFFFFF' : '#0A0E1A');
      const surface = tp.secondary_bg_color || tp.section_bg_color || (tg.colorScheme === 'light' ? '#F2F2F7' : '#0F1629');
      const text    = tp.text_color || (tg.colorScheme === 'light' ? '#0A0E1A' : '#E8EDF5');
      const hint    = tp.hint_color || (tg.colorScheme === 'light' ? '#8E8E93' : '#5A7A99');
      const accent  = tp.button_color || tp.link_color || '#229ED9';
      root.setProperty('--tg-dark', bg);
      root.setProperty('--tg-surface', surface);
      root.setProperty('--tg-text', text);
      root.setProperty('--tg-muted', hint);
      root.setProperty('--tg-blue', accent);
      const { r, g, b } = hexToRgb(accent);
      root.setProperty('--tg-border', `rgba(${r}, ${g}, ${b}, 0.18)`);
      root.setProperty('--tg-glow', `rgba(${r}, ${g}, ${b}, 0.35)`);
      document.body.setAttribute('data-theme', tg.colorScheme || 'dark');
      try {
        tg.setHeaderColor && tg.setHeaderColor(bg);
        tg.setBackgroundColor && tg.setBackgroundColor(bg);
      } catch (e) {}
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.trim().split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    }

    function reveal(screenId) {
      const el = document.getElementById(screenId);
      el.style.display = 'flex';
      gsap.fromTo(el, { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' });
    }

    function hideLoading() {
      const loading = document.getElementById('screen-loading');
      gsap.to(loading, {
        opacity: 0, y: -12, duration: 0.35, ease: 'power2.in',
        onComplete: () => { loading.style.display = 'none'; }
      });
    }

    function populateMain(tg) {
      const user = tg.initDataUnsafe?.user || {};
      const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ') || 'Người dùng';
      const avatarEl = document.getElementById('user-avatar');
      if (user.photo_url) {
        avatarEl.textContent = '';
        avatarEl.style.backgroundImage = `url('${user.photo_url}')`;
        avatarEl.style.backgroundSize = 'cover';
        avatarEl.style.backgroundPosition = 'center';
      } else {
        avatarEl.style.backgroundImage = 'none';
        avatarEl.textContent = getInitials(fullName);
      }
      document.getElementById('user-name').textContent = user.username ? '@' + user.username : fullName;
    }

    // ────────────────────────────────────────────────────────────
    // CẤU HÌNH LINK4M + BOT BACKEND
    // ────────────────────────────────────────────────────────────
    // LINK_GOC phải trỏ về đúng backend Flask của bot (route /kiem-tra-ip
    // và /bao-hoan-thanh cần được thêm vào file Python — xem ghi chú cuối).
    const LINK4M_CONFIG = {
      apiToken: '6a564c307ef9a42c86740383',
      destinationUrl: 'https://t.me/treefarm_bot',
      linkGoc: 'rwonbwdu9k1bvcsi8-production.up.railway.app' // = LINK_GOC bên bot Python
    };

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); } finally { document.body.removeChild(ta); }
      return Promise.resolve();
    }

    async function createLink4mLink(longUrl) {
      const endpoint = `https://link4m.co/api-shorten/v2?api=${encodeURIComponent(LINK4M_CONFIG.apiToken)}&url=${encodeURIComponent(longUrl)}`;
      const res = await fetch(endpoint);
      if (!res.ok) throw new Error('network');
      const data = await res.json();
      if (data.status !== 'success' || !data.shortenedUrl) {
        throw new Error(data.message || 'api-error');
      }
      return data.shortenedUrl;
    }

    // ── PHẦN 1: kiem_tra_link_hop_le (port từ bot Python) ──
    // Bot Python dùng /api-stats + clicks > 0 để xác nhận nhiệm vụ hoàn thành.
    // Ở đây gọi thẳng cùng endpoint từ client.
    async function kiemTraLinkHoanThanh(shortUrl) {
      const endpoint = `https://link4m.co/api-stats?api=${encodeURIComponent(LINK4M_CONFIG.apiToken)}&url=${encodeURIComponent(shortUrl)}`;
      try {
        const res = await fetch(endpoint);
        if (!res.ok) return false;
        const data = await res.json();
        return data.status === 'success' && parseInt(data.clicks || 0, 10) > 0;
      } catch (e) {
        console.error('Lỗi kiểm tra link:', e);
        return false;
      }
    }

    // Poll định kỳ để tự phát hiện khi user hoàn thành nhiệm vụ (giống
    // hạn 30 phút bên bot Python).
    function batDauKiemTraLink(shortUrl, onHoanThanh) {
      const interval = setInterval(async () => {
        const daXong = await kiemTraLinkHoanThanh(shortUrl);
        if (daXong) {
          clearInterval(interval);
          onHoanThanh();
        }
      }, 5000);
      const timeout = setTimeout(() => clearInterval(interval), 30 * 60 * 1000);
      return () => { clearInterval(interval); clearTimeout(timeout); };
    }

    // ── PHẦN 2: chống trùng IP (port từ ip_dang_dung bên bot Python) ──
    // Client chỉ biết IP của chính nó — việc "đang có ai dùng IP này chưa"
    // phải hỏi backend (bot) vì dict ip_dang_dung sống trên server, dùng
    // chung cho mọi người. Cần thêm 2 route Flask bên bot (xem ghi chú cuối file).
    async function layIpHienTai() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
      } catch (e) {
        console.error('Lỗi lấy IP:', e);
        return null;
      }
    }

    async function kiemTraIpVoiBot(uid, ip) {
      try {
        const res = await fetch(`${LINK4M_CONFIG.linkGoc}/kiem-tra-ip?uid=${encodeURIComponent(uid)}&ip=${encodeURIComponent(ip)}`);
        if (!res.ok) return { duoc_phep: true }; // fail-open nếu backend lỗi
        return await res.json();
      } catch (e) {
        console.error('Lỗi kiểm tra IP với bot:', e);
        return { duoc_phep: true };
      }
    }

    function setupLinkButton(tg) {
      const btn = document.getElementById('btn-get-link');
      const label = btn.querySelector('.btn-label');
      const card = document.getElementById('link-card');
      const valueEl = document.getElementById('link-result-value');
      const errorEl = document.getElementById('link-error');
      const statusEl = document.getElementById('link-status');
      const successEl = document.getElementById('link-success');
      const openBtn = document.getElementById('btn-open-link');
      const copyBtn = document.getElementById('btn-copy-link');
      let dungPollHienTai = null;

      function anTatCaThongBao() {
        errorEl.style.display = 'none';
        statusEl.style.display = 'none';
        successEl.style.display = 'none';
      }

      function batLoi(text) {
        anTatCaThongBao();
        errorEl.textContent = text;
        errorEl.style.display = 'block';
      }

      btn.addEventListener('click', async () => {
        anTatCaThongBao();
        if (dungPollHienTai) { dungPollHienTai(); dungPollHienTai = null; }
        btn.disabled = true;
        btn.classList.add('loading');
        label.textContent = 'Đang kiểm tra...';

        const uid = tg?.initDataUnsafe?.user?.id;

        // Bước 1: chống trùng IP (Phần 2) — hỏi backend trước khi tạo link
        const ip = await layIpHienTai();
        if (uid && ip) {
          const ketQua = await kiemTraIpVoiBot(uid, ip);
          if (!ketQua.duoc_phep) {
            btn.disabled = false;
            btn.classList.remove('loading');
            label.textContent = 'Nhận link rút gọn';
            return batLoi('❌ Có người cùng mạng đang làm nhiệm vụ rồi!');
          }
        }

        // Bước 2: tạo link Link4M
        label.textContent = 'Đang tạo liên kết...';
        try {
          let target = LINK4M_CONFIG.destinationUrl;
          if (uid) target += (target.includes('?') ? '&' : '?') + 'uid=' + uid;

          const shortUrl = await createLink4mLink(target);
          valueEl.textContent = shortUrl;
          openBtn.href = shortUrl;
          card.style.display = 'block';
          gsap.fromTo(card, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' });

          btn.disabled = false;
          btn.classList.remove('loading');
          label.textContent = 'Nhận link rút gọn';

          // Bước 3: kiểm tra link đã hoàn thành (Phần 1) — poll mỗi 5s
          statusEl.textContent = '⏳ Đang chờ bạn hoàn thành nhiệm vụ...';
          statusEl.style.display = 'block';
          dungPollHienTai = batDauKiemTraLink(shortUrl, () => {
            statusEl.style.display = 'none';
            successEl.textContent = '✅ Đã xác nhận hoàn thành nhiệm vụ!';
            successEl.style.display = 'block';
            dungPollHienTai = null;
          });
        } catch (err) {
          console.error('Lỗi tạo link:', err);
          btn.disabled = false;
          btn.classList.remove('loading');
          label.textContent = 'Nhận link rút gọn';
          batLoi('❌ Không tạo được link, thử lại sau nhé.');
        }
      });

      copyBtn.addEventListener('click', () => {
        copyText(valueEl.textContent).then(() => {
          const old = copyBtn.textContent;
          copyBtn.textContent = 'Đã sao chép';
          setTimeout(() => { copyBtn.textContent = old; }, 1500);
        });
      });
    }

    (function init() {
      if (!isTelegramMiniApp()) {
        document.getElementById('screen-loading').style.display = 'none';
        reveal('screen-blocked');
        return;
      }
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      applyTelegramTheme(tg);
      populateMain(tg);
      setupLinkButton(tg);

      setTimeout(() => {
        hideLoading();
        reveal('screen-main');
      }, 600);

      tg.onEvent && tg.onEvent('themeChanged', () => applyTelegramTheme(tg));
    })();
  </script>
</body>
</html>
